<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Kura Katılım Sistemi</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --background-color: #fafafa;
            --card-background: #ffffff;
            --text-color: #333333;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #111111;
                --card-background: #1a1a1a;
                --text-color: #ffffff;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }
        h2 { text-align: center; margin-top: 0; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background: transparent;
            color: inherit;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        button:hover { opacity: 0.9; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <h2>🎉 Kura Katılım Formu</h2>
    <p style="text-align: center; font-size: 13px; color: #777; margin-bottom: 20px;">Çekilişe katılmak için bilgilerinizi giriniz.</p>
    
    <form id="registrationForm" onsubmit="registerUser(event)">
        <div class="form-group">
            <label for="fullName">Adınız Soyadınız:</label>
            <input type="text" id="fullName" required placeholder="Örn: Ahmet Yılmaz">
        </div>

        <div class="form-group">
            <label for="phoneNumber">Telefon Numaranız:</label>
            <input type="tel" id="phoneNumber" required placeholder="Örn: 0555 XXXXXXX">
        </div>

        <button type="submit">Çekilişe Katıl</button>
    </form>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDstZ_LU5ryyA95XaA25VH_BuAjji4ZFjs",
        authDomain: "kura-bf13a.firebaseapp.com",
        databaseURL: "https://kura-bf13a-default-rtdb.firebaseio.com",
        projectId: "kura-bf13a",
        storageBucket: "kura-bf13a.firebasestorage.app",
        messagingSenderId: "627986543662",
        appId: "1:627986543662:web:95102be456cf5c6768dbbf"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let allParticipants = [];

    database.ref('participants').on('value', (snapshot) => {
        allParticipants = [];
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => { allParticipants.push(data[key]); });
        }
    });

    function registerUser(event) {
        event.preventDefault();
        const fullName = document.getElementById("fullName").value.trim();
        const phoneNumber = document.getElementById("phoneNumber").value.trim();

        const isAlreadyRegistered = allParticipants.some(p => p.phone === phoneNumber);
        if (isAlreadyRegistered) {
            alert("Bu telefon numarası ile daha önce kayıt yapılmış!");
            return;
        }

        database.ref('participants').push({
            name: fullName,
            phone: phoneNumber,
            timestamp: Date.now()
        }).then(() => {
            alert("Tebrikler, çekiliş kaydınız başarıyla alındı! 🎉");
            document.getElementById("registrationForm").reset();
        }).catch((error) => {
            alert("Hata oluştu: " + error.message);
        });
    }
</script>
</body>
</html>
