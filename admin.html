<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kura Yönetim Paneli</title>
    <style>
        :root {
            --primary-color: #0070f3;
            --secondary-color: #ff0070;
            --background-color: #fafafa;
            --card-background: #ffffff;
            --text-color: #333333;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --background-color: #111111;
                --card-background: #1a1a1a;
                --text-color: #ffffff;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-background);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        h3 { text-align: center; margin-top: 0; color: var(--primary-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            background: transparent;
            color: inherit;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-draw { background-color: var(--secondary-color); }
        .btn-clear { background-color: #666; font-size: 12px; padding: 8px; }
        .counter-badge {
            text-align: center;
            font-weight: bold;
            margin: 15px 0;
            padding: 8px;
            background: rgba(0, 112, 243, 0.1);
            border-radius: 6px;
        }
        .result-container {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 0, 112, 0.1);
            border-left: 5px solid var(--secondary-color);
            border-radius: 4px;
            display: none;
        }
        .result-container.active { display: block; }
        .winner-list { list-style: none; padding: 0; margin: 0; }
        .winner-list li {
            padding: 12px;
            background: var(--card-background);
            margin-bottom: 8px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .winner-info { display: flex; flex-direction: column; }
        .winner-name { font-weight: bold; }
        .winner-phone { font-size: 12px; color: #888; }
        .winner-badge {
            background: var(--secondary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <h3>⚙️ Kura Yönetim Paneli</h3>
    
    <div class="counter-badge">
        Canlı Toplam Katılımcı: <span id="participantCount">0</span> Kişi
    </div>

    <div class="form-group">
        <label for="winnerCount">Kaç Kişi Kazanacak?</label>
        <input type="number" id="winnerCount" value="1" min="1">
    </div>

    <button onclick="drawLottery()" class="btn-draw">🎰 Kurayı Çek!</button>
    <button onclick="clearList()" class="btn-clear">Veritabanını Sıfırla</button>

    <div class="result-container" id="resultBox">
        <h3>🏆 Şanslı Kazananlar</h3>
        <ul class="winner-list" id="winners"></ul>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDstZ_LU5ryyA95XaA25VH_BuAjji4ZFjs",
        authDomain: "kura-bf13a.firebaseapp.com",
        databaseURL: "https://kura-bf13a-default-rtdb.firebaseio.com",
        projectId: "kura-bf13a",
        storageBucket: "kura-bf13a.firebasestorage.app",
        messagingSenderId: "627986543662",
        appId: "1:627986543662:web:95102be456cf5c6768dbbf"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let allParticipants = [];

    database.ref('participants').on('value', (snapshot) => {
        allParticipants = [];
        const data = snapshot.val();
        if (data) {
            Object.keys(data).forEach(key => { allParticipants.push(data[key]); });
        }
        document.getElementById("participantCount").innerText = allParticipants.length;
    });

    function drawLottery() {
        const count = parseInt(document.getElementById("winnerCount").value) || 1;
        const resultBox = document.getElementById("resultBox");
        const winnersUl = document.getElementById("winners");

        if (allParticipants.length === 0) { alert("Henüz katılımcı yok!"); return; }
        if (count > allParticipants.length) { alert("Kazanacak sayısı katılımcıdan fazla olamaz!"); return; }

        winnersUl.innerHTML = "<li>Kura çekiliyor... 🎲</li>";
        resultBox.classList.add('active');

        setTimeout(() => {
            winnersUl.innerHTML = "";
            let winners = [];
            let pool = [...allParticipants];

            for (let i = 0; i < count; i++) {
                const randomIndex = Math.floor(Math.random() * pool.length);
                winners.push(pool[randomIndex]);
                pool.splice(randomIndex, 1);
            }

            winners.forEach((winner, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <div class="winner-info">
                        <span class="winner-name">${winner.name}</span>
                        <span class="winner-phone">${winner.phone}</span>
                    </div>
                    <span class="winner-badge">${index + 1}. Talihli</span>
                `;
                winnersUl.appendChild(li);
            });
        }, 1500);
    }

    function clearList() {
        if (confirm("Tüm listeyi silmek istediğinize emin misiniz?")) {
            database.ref('participants').remove().then(() => {
                document.getElementById("resultBox").classList.remove('active');
                alert("Liste sıfırlandı!");
            });
        }
    }
</script>
</body>
</html>
